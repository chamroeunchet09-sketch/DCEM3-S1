      { id: 153, subject: 'Medecine Legale', text: "25-бһ•бһӣбһңбһ·бһ”бһ¶бһҖбһҖбҹҶбһҡбһ·бһҸбһ’бҹ’бһ„бһ“бҹӢбһҖбҹ’бһ“бһ»бһ„бһҖбһҡбһҺбһёбһ–бһ»бһӣбһҗбҹ’бһ“бһ¶бҹҶбһҡбҹүбһ¶бҹҶбһҡбҹүбҹғбһҳбһ¶бһ“бһўбҹ’бһңбһёбһҒбҹ’бһӣбҹҮ? (бһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһ…бһҳбҹ’бһӣбһҫбһҷбһҒбһ»бһҹбҹЎ)", options: ["A. Cirrhose du foie", "B. PolynГ©vrite", "C. DГ©lire", "D. Gastrite"], answer: 3 },

      { id: 155, subject: 'Medecine Legale', text: "27-бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҖбһ¶бһҖбһҹбҹҶбһҺбһӣбҹӢбһҶбҹ’бһўбһ№бһ„бһҖбҹ„бһҹбһӣбҹ’бһҷбһңбһ·бһ…бҹ’бһ…бҹҗбһҷбһҸбһҫбһҸбҹ’бһҡбһјбһңбһңбһ·бһ—бһ¶бһӮбһўбҹ’бһңбһёбһҮбһ¶бһҠбҹҶбһ”бһјбһ„? (бһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһ…бһҳбҹ’бһӣбһҫбһҷбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбҹЎ)", options: ["A. бһ”бҹӮбһ„бһ…бҹӮбһҖбһҸбһ¶бһҳбһ”бҹ’бһҡбһ—бҹҒбһ‘бһҶбҹ’бһўбһ№бһ„", "B. бһҸбһҫбһҮбһ¶бһҶбҹ’бһўбһ№бһ„бһҖбһјбһ“бһҖбҹ’бһҳбҹҒбһ„бһ¬бһҳбһ“бһ»бһҹбҹ’бһҹбһ–бҹҒбһүбһңбҹҗбһҷ", "C. бһҖбҹҶбһҺбһҸбҹӢбһҶбҹ’бһўбһ№бһ„бһҸбһ¶бһҳбһ–бһјбһҮбһҹбһ¶бһҹбһ“бҹҚ", "D. бһҖбҹҶбһҺбһҸбҹӢбһҮбһ¶бһҶбҹ’бһўбһ№бһ„бһҳбһ“бһ»бһҹбҹ’бһҹбһ¬бһҹбһҸбҹ’бһңбһ–бһ¶бһ бһ“бҹҲ"], answer: 3 },

    const shuffleArray = (array) => {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    };

    const shuffleOptionsAndAnswer = (question) => {
      const optionsWithIndex = question.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
      const shuffledOptions = shuffleArray(optionsWithIndex);
      const newAnswerIndex = shuffledOptions.findIndex(opt => opt.originalIndex === question.answer);
      return {
        ...question,
        options: shuffledOptions.map(opt => opt.text),
        answer: newAnswerIndex,
        originalQuestionId: question.id
      };
    };

                <button
                  onClick={prevQuestion}
                  disabled={currentIndex === 0}
                  className={`flex items-center px-4 py-2 rounded-lg font-medium transition-colors ${
                    currentIndex === 0 
                      ? 'text-gray-300 cursor-not-allowed' 
                      : 'text-gray-600 hover:bg-gray-200'
                  }`}
                >
                  <ChevronLeft size={20} className="mr-1" /> бһҗбһҷбһҖбҹ’бһҡбҹ„бһҷ
                </button>

                <button
                  onClick={nextQuestion}
                  disabled={!hasAnswered}
                  className={`flex items-center px-6 py-3 rounded-lg font-bold shadow-sm transition-all ${
                    hasAnswered 
                      ? 'bg-indigo-600 text-white hover:bg-indigo-700 transform hover:scale-105' 
                      : 'bg-gray-300 text-gray-100 cursor-not-allowed'
                  }`}
                >
                  {isLast ? 'бһ”бһүбҹ’бһҮбһјбһ“бһ…бһҳбҹ’бһӣбһҫбһҷ' : 'бһҹбҹҶбһҺбһҪбһҡбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢ'}
                  {!isLast && <ChevronRight size={20} className="ml-1" />}
                </button>
              </div>
            </div>
          </div>
        );
      };

      const renderResultsView = () => {
        const score = calculateScore();
        const total = activeQuizQuestions.length;
        const percentage = Math.round((score / total) * 100);

        let message = "бһ’бҹ’бһңбһҫбһ”бһ¶бһ“бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ!";
        if (percentage < 50) message = "бһҒбһ·бһҸбһҒбҹҶбһҡбҹҖбһ“бһ”бһ“бҹ’бһҸбһ‘бҹҖбһҸ бһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ’бҹ’бһңбһҫбһ”бһ¶бһ“бһӣбҹ’бһўбһҮбһ¶бһ„бһ“бҹҒбҹҮ!";
        else if (percentage < 80) message = "бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ! бһҸбҹ’бһҡбһјбһңбһўбһ“бһ»бһңбһҸбҹ’бһҸбһ”бһ“бҹ’бһҗбҹӮбһҳбһ”бһ“бҹ’бһҸбһ·бһ…бһ‘бҹҖбһҸбҹ”";

        return (
          <div className="max-w-4xl mx-auto py-10 px-4 sm:px-6">
            <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 mb-8 text-center py-12">
              <Award size={64} className={`mx-auto mb-4 ${percentage >= 50 ? 'text-yellow-400' : 'text-gray-400'}`} />
              <h2 className="text-4xl font-extrabold text-gray-900 mb-2">{percentage}%</h2>
              <p className="text-xl text-gray-600 mb-6">бһўбҹ’бһ“бһҖбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ–бһ·бһ“бҹ’бһ‘бһ» {score} бһӣбһҫ {total}</p>
              <p className="text-lg font-medium text-indigo-600">{message}</p>
              
              <div className="mt-8 flex justify-center space-x-4">
                <button 
                  onClick={() => {
                    localStorage.removeItem('mediQuizSession');
                    setSavedSession(null);
                    setCurrentView('setup');
                  }}
                  className="flex items-center px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-xl font-semibold transition-colors"
                >
                  <Settings className="mr-2" size={20} /> бһҡбҹҖбһ”бһ…бҹҶбһЎбһҫбһ„бһңбһ·бһү
                </button>
                <button 
                  onClick={startQuiz}
                  className="flex items-center px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold shadow-md transition-transform hover:-translate-y-1"
                >
                  <RefreshCcw className="mr-2" size={20} /> бһ’бҹ’бһңбһҫбһҸбҹҒбһҹбҹ’бһҸбһҳбҹ’бһҸбһ„бһ‘бҹҖбһҸ
                </button>
              </div>
            </div>

            <h3 className="text-2xl font-bold text-gray-900 mb-6">бһҖбһ¶бһҡбһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ…бһҳбҹ’бһӣбһҫбһҷбһӣбһҳбҹ’бһўбһ·бһҸ</h3>
            <div className="space-y-6">
              {activeQuizQuestions.map((q, idx) => {
                const userAns = userAnswers[idx];
                const isCorrect = userAns === q.answer;

                return (
                  <div key={idx} className={`bg-white p-6 rounded-xl shadow-sm border-l-8 ${isCorrect ? 'border-l-green-500' : 'border-l-red-500'}`}>
                    <div className="flex justify-between items-start mb-4">
                      <h4 className="text-lg font-medium text-gray-900 leading-tight pr-8 whitespace-pre-line">
                        <span className="text-gray-400 mr-2">{idx + 1}.</span>
                        {q.text}
                      </h4>
                      {isCorrect ? (
                        <CheckCircle2 size={28} className="text-green-500 flex-shrink-0" />
                      ) : (
                        <XCircle size={28} className="text-red-500 flex-shrink-0" />
                      )}
                    </div>
                    
                    <div className="space-y-2 mt-4">
                      {q.options.map((opt, optIdx) => {
                        let styling = "p-3 rounded-lg text-sm border ";
                        let icon = null;

                        if (optIdx === q.answer) {
                          styling += "bg-green-50 border-green-200 text-green-800 font-medium";
                          icon = <CheckCircle2 size={16} className="mr-2 text-green-600 flex-shrink-0" />;
                        } else if (optIdx === userAns && !isCorrect) {
                          styling += "bg-red-50 border-red-200 text-red-800";
                          icon = <XCircle size={16} className="mr-2 text-red-600 flex-shrink-0" />;
                        } else {
                          styling += "bg-gray-50 border-gray-100 text-gray-500";
                          icon = <div className="w-4 h-4 mr-2 flex-shrink-0" />;
                        }

                        return (
                          <div key={optIdx} className={`${styling} flex items-center`}>
                            {icon}
                            <span className="whitespace-pre-line">{opt}</span>
                            {optIdx === userAns && !isCorrect && <span className="ml-auto text-xs font-bold text-red-500 uppercase flex-shrink-0">бһ…бһҳбҹ’бһӣбһҫбһҷбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ</span>}
                            {optIdx === q.answer && <span className="ml-auto text-xs font-bold text-green-600 uppercase flex-shrink-0">бһ…бһҳбҹ’бһӣбһҫбһҷбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col bg-gray-50 font-sans selection:bg-indigo-100">
          {renderHeader()}
          <div className="flex flex-1 overflow-hidden relative">
            {renderSidebar()}
            <main className="flex-1 overflow-y-auto">
              <div className="pb-12">
                {currentView === 'setup' && renderSetupView()}
                {currentView === 'list' && renderListView()}
                {currentView === 'quiz' && renderQuizView()}
                {currentView === 'results' && renderResultsView()}
              </div>
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
